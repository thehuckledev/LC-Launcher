<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self';" />
    <title>About LC Launcher</title>

    <link rel="stylesheet" href="./about.css">

    <link rel="stylesheet" href="../window/window.css">
    <script type="module" src="../window/window.js"></script>
</head>

<body>

    <div id="container">

        <header id="titlebar">
            <div id="drag-region">

                <div id="window-title">
                    <span>About LC Launcher</span>
                </div>

                <div id="window-controls">

                    <div class="button" id="close-button">
                        <img class="icon" src="../window/titlebar/close.png" draggable="false" />
                    </div>

                </div>
            </div>
        </header>

        <div id="main">
            <div id="info">
                <img id="logo" src="../assets/logo.png" draggable="false" />

                <div id="infobar">
                    <a class="link" href="https://git.huckle.dev/TheHuckle/LegacyCommunityLauncher/releases/"
                        tabindex="-1">Releases</a>
                    <a id="version">Version 0.0</a>
                    <a class="link" href="https://git.huckle.dev/TheHuckle/LegacyCommunityLauncher/" tabindex="-1">Git
                        Repo</a>
                </div>

                <p id="description">
                    Multi-platform launcher for Minecraft Legacy Console Edition forks.
                </p>

                <p id="creators">
                    Created by
                    <a href="https://huckle.dev/" tabindex="-1">TheHuckle</a>
                </p>
            </div>

            <div id="meta">
                <div class="meta-row">
                    <span class="label">Platform</span>
                    <span id="platform">Loading...</span>
                </div>

                <div class="meta-row">
                    <span class="label">Electron</span>
                    <span id="electron">Loading...</span>
                </div>

                <div class="meta-row">
                    <span class="label">Chromium</span>
                    <span id="chromium">Loading...</span>
                </div>

                <div class="meta-row">
                    <span class="label">License</span>
                    <span>CC-BY-NC-SA-4.0</span>
                </div>
            </div>
        </div>

    </div>

    <script src="./about.js"></script>
</body>

</html>
