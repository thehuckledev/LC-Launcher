<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegacyLauncher</title>
    <link rel="icon" type="image/png" href="256x256.png">

    <link rel="stylesheet" href="./window/window.css">
    <script type="module" src="./window/window.js"></script>

    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <div id="container">

        <div id="window-background" class="fade animated"><div></div></div>

        <header id="titlebar">
            <div id="drag-region">

                <div id="window-title">
                    <!--<span>Legacy Community Launcher</span>-->
                </div>

                <div id="window-controls">

                    <div class="button" id="min-button">
                        <img class="icon" src="./window/titlebar/min.png" draggable="false" />
                    </div>
                    <div class="button" id="max-button">
                        <img class="icon" src="./window/titlebar/max.png" draggable="false" />
                    </div>
                    <div class="button" id="restore-button">
                        <img class="icon" src="./window/titlebar/restore.png" draggable="false" />
                    </div>
                    <div class="button" id="close-button">
                        <img class="icon" src="./window/titlebar/close.png" draggable="false" />
                    </div>

                </div>
            </div>
        </header>

        <div id="main" class="open-anim">
            <div id="top-bar">
                <div id="accounts">
                    <img id="account-icon" src="./assets/icons/account.png" draggable="false">
                    <div id="account-details">
                        <h1>TheHuckle</h1>
                        <h2>Offline Account</h2>
                    </div>
                </div>
                <div id="main-actions">
                    <div id="news-button" class="mc-button">
                        <div class="title"><img id="discover-icon" src="./assets/buttons/news.svg" draggable="false"></div>
                    </div>
                    <div id="options-button" class="mc-button">
                        <div class="title"><img id="servers-icon" src="./assets/buttons/options.svg" draggable="false"></div>
                    </div>
                </div>
            </div>
            <div id="bottom-bar">
                <img id="main-logo" src="./assets/minecraftlogo.png" draggable="false">
                <div id="launch-options-bar">
                    <div id="instances">
                        <img id="instance-icon" src="./assets/icons/instance.png" draggable="false">
                        <div id="instance-details">
                            <h1>Nightly</h1>
                            <h2>1.10.7</h2>
                        </div>
                    </div>
                    <div id="main-actions">
                        <div id="discover-button" class="mc-button">
                            <div class="title"><img id="discover-icon" src="./assets/buttons/discover.svg" draggable="false"></div>
                        </div>
                        <div id="play-button" class="mc-button">
                            <div class="title">Play</div>
                        </div>
                        <div id="servers-button" class="mc-button">
                            <div class="title"><img id="servers-icon" src="./assets/buttons/servers.svg" draggable="false"></div>
                        </div>
                    </div>
                    <div id="stats">
                        <h1>Playtime</h1>
                        <h2>32d 1h 30m</h2>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
