name: Nightly LC Launcher

on:
    workflow_dispatch:
    schedule:
        - cron: "0 0 * * *"

permissions:
    contents: write

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: windows-latest
                      target: windows
                    - os: ubuntu-latest
                      target: linux
                    - os: macos-latest
                      target: darwin
        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup bun
              uses: oven-sh/setup-bun@v2
              with:
                bun-version: latest

            - name: Setup node
              uses: actions/setup-node@v4
              with:
                node-version: latest

            - name: Install installer deps (Windows)
              if: matrix.os == 'windows-latest'
              shell: powershell
              run: choco install nsis -y

            - name: Install installer deps (Mac)
              if: matrix.os == 'macos-latest'
              run: HOMEBREW_REQUIRE_TAP_TRUST=1 brew install create-dmg

            - name: Install installer deps (Linux)
              if: matrix.os == 'ubuntu-latest'
              run: |
                sudo apt-get install -y libfuse2

                wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
                chmod +x appimagetool
                sudo mv appimagetool /usr/local/bin/

            - name: Build lib
              run: bun ./build-scripts/build-lib.js ${{ matrix.target }}

            - name: Build app
              run: node ./build-scripts/build.js ${{ matrix.target }}

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              with:
                name: build-${{ matrix.target }}
                path: |
                  dist/
                  !dist/__*

    publish:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                path: artifacts
                merge-multiple: true

            - name: Publish release
              uses: softprops/action-gh-release@v1
              with:
                tag_name: nightly-${{ github.run_id }}
                name: "Nightly Build ${{ github.run_id }}"
                body: "If you have any issues with the builds below, please contact an LC Launcher dev in our discord!"
                target_commitish: ${{ github.sha }}
                generate_release_notes: true
                prerelease: true
                files: artifacts/*
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}